<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCarbono - Agrinho 2026</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌱 EcoCarbono</h1>
            <p>Calculadora de Créditos Verdes para o Agro Paranaense</p>
        </header>

        <main>
            <section class="form-section">
                <h2>Dados da Propriedade</h2>
                
                <div class="input-group">
                    <label for="diesel">Combustível gasto nos tratores (Litros/Ano):</label>
                    <input type="number" id="diesel" placeholder="Ex: 5000" min="0">
                </div>

                <div class="input-group">
                    <label for="mata">Área de Mata Preservada (Hectares):</label>
                    <input type="number" id="mata" placeholder="Ex: 15" min="0">
                </div>

                <button id="btn-calcular">Calcular Impacto Ambiental</button>
            </section>

            <section id="resultado" class="result-section hidden">
                <h2>📊 Balanço Ecológico</h2>
                <div class="cards">
                    <div class="card emissao">
                        <h3>Poluição Gerada</h3>
                        <p id="txt-emissao">0 kg de CO₂</p>
                    </div>
                    <div class="card sequestro">
                        <h3>Carbono Absorvido</h3>
                        <p id="txt-sequestro">0 kg de CO₂</p>
                    </div>
                </div>
                
                <div id="status-box" class="status-box">
                    <h3 id="status-titulo">Resultado</h3>
                    <p id="status-desc"></p>
                </div>
            </section>
        </main>

        <footer>
            <p>Projeto Agrinho 2026 • 1º Ano do Ensino Médio • Agro Forte, Futuro Sustentável</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
