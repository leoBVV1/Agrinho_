<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCarbono - Agrinho 2026</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌱 EcoCarbono</h1>
            <p>Calculadora de Créditos Verdes • Agrinho 2026</p>
        </header>

        <main>
            <section class="form-section">
                <h2>Dados da Propriedade</h2>
                
                <div class="grid-inputs">
                    <div class="input-group">
                        <label for="diesel">Diesel Gasto (Litros/Ano):</label>
                        <input type="number" id="diesel" value="0" min="0">
                    </div>

                    <div class="input-group">
                        <label for="fertilizante">Adubo Químico (Kg/Ano):</label>
                        <input type="number" id="fertilizante" value="0" min="0">
                    </div>

                    <div class="input-group">
                        <label for="mata">Mata Preservada (Hectares):</label>
                        <input type="number" id="mata" value="0" min="0">
                    </div>

                    <div class="input-group">
                        <label for="plantio-direto">Plantio Direto (Hectares):</label>
                        <input type="number" id="plantio-direto" value="0" min="0">
                    </div>
                </div>

                <button id="btn-calcular">Calcular Impacto Ambiental</button>
            </section>

            <section id="resultado" class="result-section hidden">
                <h2>📊 Balanço Ecológico</h2>
                
                <div class="cards">
                    <div class="card emissao">
                        <h3>Poluição Gerada</h3>
                        <p id="txt-emissao">0 kg</p>
                    </div>
                    <div class="card sequestro">
                        <h3>Carbono Absorvido</h3>
                        <p id="txt-sequestro">0 kg</p>
                    </div>
                </div>

                <!-- Gráfico Nativo em CSS puro (Não quebra nunca) -->
                <div class="grafico-container">
                    <div class="barra-wrapper">
                        <span class="label-barra">Emissões</span>
                        <div class="bg-barra">
                            <div id="barra-emissao" class="progresso-barra vermelho" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="barra-wrapper">
                        <span class="label-barra">Sequestro</span>
                        <div class="bg-barra">
                            <div id="barra-sequestro" class="progresso-barra verde" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
                
                <div id="status-box" class="status-box">
                    <h3 id="status-titulo">Resultado</h3>
                    <p id="status-desc"></p>
                    <p id="status-financeiro" class="financeiro-texto"></p>
                </div>

                <button onclick="window.print()" class="btn-secundario">📄 Imprimir Relatório</button>
            </section>
        </main>

        <footer>
            <p>1º Ano Ensino Médio • Paraná • Agro Forte, Futuro Sustentável</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
